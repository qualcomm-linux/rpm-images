# Qualcomm-specific kernel modules to pull into the initrd.
# Uncomment the add_drivers line (or extend it) to force-include modules
# that are not auto-detected by dracut's dependency walk.
#add_drivers+=" phy-qcom-qmp-pcie phy-qcom-qmp-ufs qcom_ice ufs-qcom xor-neon zstd_compress "

# Prevent dracut from pulling in modules that are not needed for early boot.
# These are picked up from the build host and would bloat the initrd unnecessarily.
omit_drivers+=" pwrseq-qcom-wcn wcnss_ctrl qrtr qrtr-mhi qrtr-smd qrtr-tun qcom_glink_smem qmi_helpers qcom_pdr_msg qcom_pd_mapper pdr_interface rmtfs_mem "
