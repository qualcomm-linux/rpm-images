#
# Workaround: ensure QRTR transport modules are loaded before ath11k_ahb.
# qrtr and qrtr-smd must be present so the QRTR socket layer is ready
# to carry the QMI service announcement from the Q6 firmware when
# ath11k_ahb probe() runs.
softdep ath11k_ahb pre: qrtr qrtr-smd qmi_helpers
