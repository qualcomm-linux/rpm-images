name: Install host dependencies
description: >
  Install the Ubuntu host packages required by the image/flash build steps.
  On ephemeral runners every job starts on a fresh machine, so each job that
  uses these tools must install them itself rather than relying on a shared
  setup job.

runs:
  using: composite
  steps:
    - name: Install host dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          python3 \
          python3-pip \
          pipx \
          dnf \
          createrepo-c \
          parted \
          kpartx \
          e2fsprogs \
          xfsprogs \
          qemu-user-static \
          dosfstools \
          mtools \
          bsdmainutils \
          gawk \
          rpm \
          cpio \
          device-tree-compiler \
          u-boot-tools \
          qemu-utils \
          curl \
          unzip \
          tar \
          coreutils \
          git

    - name: Install kiwi-ng
      shell: bash
      run: |
        set -euo pipefail
        sudo PIPX_BIN_DIR=/usr/local/bin pipx install kiwi
        sudo kiwi-ng --version
