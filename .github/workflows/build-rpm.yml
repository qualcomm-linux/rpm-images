name: Build RPM images

on:
  workflow_call:
    outputs:
      artifacts_url:
        description: "URL to retrieve build artifacts"
        value: ${{ jobs.create-output.outputs.url }}

permissions:
  contents: read

# Concurrency is used to prevent multiple workflows from running for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: true

env:
  BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
  FILESERVER_URL: "https://qli-prod-artifacts.qualcomm.com"

jobs:

  kernel-rpm:
    name: Phase 1 - Kernel RPM
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    container:
      image: fedora:latest
      options: --user 0:0
    steps:
      - name: Record workspace owner
        run: |
          set -euo pipefail
          owner="$(stat -c '%u:%g' "$GITHUB_WORKSPACE")"
          echo "Workspace owner: ${owner}"
          echo "WORKSPACE_OWNER=${owner}" >> "$GITHUB_ENV"

      - name: Install kernel build dependencies
        run: |
          set -euo pipefail
          dnf install -y \
            git make gcc bc bison flex perl python3 \
            openssl openssl-devel elfutils-libelf-devel elfutils-devel \
            rpm-build rpmdevtools \
            rsync tar gzip findutils diffutils coreutils \
            kmod dwarves \
            hostname which

      - name: Checkout
        uses: actions/checkout@v7

      - name: Build kernel RPMs
        run: |
          set -euo pipefail
          python3 scripts/build_binrpm_pkg.py \
            --qcom-6.18.y

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kernel-artifacts
          if-no-files-found: error
          path: |
            linux/rpmbuild/RPMS/aarch64/kernel-*.rpm
            linux/rpmbuild/SRPMS/kernel-*.src.rpm
          retention-days: 7

      - name: Hand workspace back to runner user
        if: always()
        run: |
          set -euo pipefail
          chown -R "${WORKSPACE_OWNER}" "$GITHUB_WORKSPACE" || true


  publish-kernel-rpms:
    name: Publish kernel RPMs to S3
    needs: kernel-rpm
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    steps:
      - name: Download kernel artifacts
        uses: actions/download-artifact@v8
        with:
          name: kernel-artifacts
          path: kernel-artifacts

      - name: Stage kernel RPMs for publishing
        run: |
          set -euo pipefail
          mkdir -p kernel-rpms
          cp -a kernel-artifacts/RPMS/aarch64/kernel-*.rpm kernel-rpms/ 2>/dev/null || true
          cp -a kernel-artifacts/SRPMS/kernel-*.src.rpm    kernel-rpms/ 2>/dev/null || true
          (cd kernel-rpms && sha256sum $(find . -maxdepth 1 -type f) | tee sha256sums.txt)

      - name: Publish kernel RPMs (S3)
        uses: qualcomm-linux/upload-private-artifact-action@aws-v4
        id: upload_kernel_s3
        with:
          path: kernel-rpms
          s3_bucket: qli-prd-platform-gh-artifacts
          destination: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.BUILD_ID }}/kernel-rpms/
          fileserver_url: ${{ env.FILESERVER_URL }}

      - name: Print kernel RPM download URL
        env:
          kernel_url: ${{ steps.upload_kernel_s3.outputs.url }}
        run: |
          echo "Kernel RPMs URL: ${kernel_url}"
          echo "## Kernel RPMs URL" >> $GITHUB_STEP_SUMMARY
          echo "[${kernel_url}](${kernel_url})" >> $GITHUB_STEP_SUMMARY


  os-image:
    name: Phase 2 - OS disk image (mkosi)
    needs: [kernel-rpm]
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install host dependencies
        uses: ./.github/actions/install-host-deps

      - name: Download kernel artifacts
        uses: actions/download-artifact@v8
        with:
          name: kernel-artifacts
          path: kernel-artifacts

      - name: Stage kernel RPMs into mkosi.packages
        run: |
          set -euo pipefail
          mkdir -p mkosi.packages
          cp kernel-artifacts/RPMS/aarch64/*.rpm mkosi.packages/

      - name: Build disk image with mkosi
        run: |
          set -euo pipefail
          umask 0022
          mkdir -p build/output build/logs
          mkosi \
            --profile rb3gen2 \
            -O build/output \
            --force \
            --sandbox=none \
            build \
            2>&1 | tee build/logs/build-cs-stream-console.log
          test -f build/output/image.raw            || { echo "[!] mkosi did not produce build/output/image.raw";              exit 1; }
          test -f build/output/image.efi            || { echo "[!] mkosi did not produce build/output/image.efi";              exit 1; }
          test -f build/output/image.root-arm64.raw || { echo "[!] mkosi did not produce build/output/image.root-arm64.raw";   exit 1; }
          test -f build/output/dtbs.tar.gz          || { echo "[!] mkosi did not produce build/output/dtbs.tar.gz";            exit 1; }

      - name: Upload mkosi artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mkosi-artifacts
          if-no-files-found: error
          path: |
            build/output/image.raw
            build/output/image.efi
            build/output/image.esp.raw
            build/output/image.root-arm64.raw
            build/output/dtbs.tar.gz
          retention-days: 7


  flash-package:
    name: Phase 3 - Per-board flash packages
    needs: [os-image]
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install host dependencies
        uses: ./.github/actions/install-host-deps

      - name: Download mkosi artifacts
        uses: actions/download-artifact@v8
        with:
          name: mkosi-artifacts
          path: build/output

      - name: Download kernel artifacts
        uses: actions/download-artifact@v8
        with:
          name: kernel-artifacts
          path: kernel-artifacts

      - name: Generate per-board flash packages
        run: |
          set -euo pipefail
          ./scripts/generate_flat_build.sh \
            --dtbs-tar=build/output/dtbs.tar.gz \
            --esp-vfat=build/output/image.esp.raw \
            --rootfs-ext4=build/output/image.root-arm64.raw \
            --target-boards=qcs6490-rb3gen2-vision-kit

      - name: Stage artifacts for publishing
        run: |
          set -euo pipefail
          mkdir -p rpm-artifacts
          gzip -c build/output/image.raw \
            > rpm-artifacts/centos-10-image-aarch64.raw.gz
          for d in build/out/flash_*; do
            [ -d "$d" ] || continue
            board="$(basename "$d")"
            tar -czf "rpm-artifacts/${board}.tar.gz" -C "$d" .
          done
          (cd rpm-artifacts && sha256sum $(find . -maxdepth 1 -type f) | tee sha256sums.txt)

      - name: Upload artifacts (S3)
        uses: qualcomm-linux/upload-private-artifact-action@aws-v4
        id: upload_artifacts_s3
        with:
          path: rpm-artifacts
          s3_bucket: qli-prd-platform-gh-artifacts
          destination: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.BUILD_ID }}/
          fileserver_url: ${{ env.FILESERVER_URL }}

      - name: Upload flash packages
        uses: actions/upload-artifact@v7
        with:
          name: flash-packages
          if-no-files-found: error
          path: rpm-artifacts/flash_*.tar.gz
          retention-days: 7

      - name: Print download URL
        env:
          build_url: ${{ steps.upload_artifacts_s3.outputs.url }}
        run: |
          echo "Downloads URL: ${build_url}"
          echo "${build_url}" > build_url
          echo "## Download URL" >> $GITHUB_STEP_SUMMARY
          echo "[${build_url}](${build_url})" >> $GITHUB_STEP_SUMMARY

      - name: Upload build URL
        uses: actions/upload-artifact@v7
        with:
          name: build_url
          path: build_url
          retention-days: 7


  create-output:
    name: Publish artifacts URL
    needs: flash-package
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Download build URL
        uses: actions/download-artifact@v8
        with:
          name: build_url
      - id: url
        run: |
          url="$(cat build_url 2>/dev/null || echo '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')"
          echo "url=${url}" >> "$GITHUB_OUTPUT"
