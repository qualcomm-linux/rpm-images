name: Build RPM images

on:
  workflow_call:
    outputs:
      artifacts_url:
        description: "URL to retrieve build artifacts"
        value: ${{ jobs.build-and-flash.outputs.url }}

permissions:
  contents: read

# Concurrency is used to prevent multiple workflows from running for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: true

env:
  BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
  FILESERVER_URL: "https://qli-prod-artifacts.qualcomm.com"

jobs:

  kernel-rpm:
    name: Phase 1 - Kernel RPM
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    container:
      image: fedora:latest
      options: --user 0:0
    steps:
      - name: Record workspace owner
        run: |
          set -euo pipefail
          owner="$(stat -c '%u:%g' "$GITHUB_WORKSPACE")"
          echo "Workspace owner: ${owner}"
          echo "WORKSPACE_OWNER=${owner}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Build kernel RPMs
        uses: ./.github/actions/build-kernel-rpm
        with:
          kernel-ref: qcom-6.18.y

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kernel-artifacts
          if-no-files-found: error
          path: |
            linux/rpmbuild/RPMS/aarch64/kernel-*.rpm
            linux/rpmbuild/SRPMS/kernel-*.src.rpm
          retention-days: 1

      - name: Hand workspace back to runner user
        if: always()
        run: |
          set -euo pipefail
          chown -R "${WORKSPACE_OWNER}" "$GITHUB_WORKSPACE" || true


  publish-kernel-rpms:
    name: Publish kernel RPMs to S3
    needs: kernel-rpm
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    steps:
      - name: Download kernel artifacts
        uses: actions/download-artifact@v8
        with:
          name: kernel-artifacts
          path: kernel-artifacts

      - name: Stage kernel RPMs for publishing
        run: |
          set -euo pipefail
          mkdir -p kernel-rpms
          cp -a kernel-artifacts/RPMS/aarch64/kernel-*.rpm kernel-rpms/ 2>/dev/null || true
          cp -a kernel-artifacts/SRPMS/kernel-*.src.rpm    kernel-rpms/ 2>/dev/null || true
          (cd kernel-rpms && sha256sum $(find . -maxdepth 1 -type f) | tee sha256sums.txt)

      - name: Publish kernel RPMs (S3)
        uses: qualcomm-linux/upload-private-artifact-action@aws-v4
        id: upload_kernel_s3
        with:
          path: kernel-rpms
          s3_bucket: qli-prd-platform-gh-artifacts
          destination: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.BUILD_ID }}/kernel-rpms/
          fileserver_url: ${{ env.FILESERVER_URL }}

      - name: Print kernel RPM download URL
        env:
          kernel_url: ${{ steps.upload_kernel_s3.outputs.url }}
        run: |
          echo "Kernel RPMs URL: ${kernel_url}"
          echo "## Kernel RPMs URL" >> $GITHUB_STEP_SUMMARY
          echo "[${kernel_url}](${kernel_url})" >> $GITHUB_STEP_SUMMARY


  build-and-flash:
    name: Phase 2 - Image, extract & flash packages
    needs: [kernel-rpm]
    runs-on: [self-hosted, platform-prd-u2404-arm64-large-od-ephem]
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install host dependencies
        uses: ./.github/actions/install-host-deps

      - name: Download kernel artifacts
        uses: actions/download-artifact@v8
        with:
          name: kernel-artifacts
          path: kernel-artifacts

      - name: Stage kernel RPMs
        run: |
          set -euo pipefail
          mkdir -p local-rpms
          cp kernel-artifacts/RPMS/aarch64/*.rpm local-rpms/

      - name: Build image, extract, and assemble flash packages
        run: |
          set -euo pipefail
          # `make flash` chains image -> flash-artifacts -> flash on a single
          # disk, so no intermediate binaries need to be passed between jobs.
          sudo HOME=/tmp make flash \
            LOCAL_RPMS_DIR=local-rpms \
            TARGET_BOARDS=qcs6490-rb3gen2-vision-kit \
            EXTRA_FLASH_OPTS=--verbose=true

          # make ran as root; hand the outputs back so later steps can read them.
          sudo chown -R "$(id -u):$(id -g)" build

      - name: Stage SBOMs and flash packages for publishing
        run: |
          set -euo pipefail
          mkdir -p rpm-artifacts
          find build/output -name '*.spdx.json' -exec cp -a {} rpm-artifacts/ \;
          for d in build/out/flash_*; do
            [ -d "$d" ] || continue
            board="$(basename "$d")"
            tar -czf "rpm-artifacts/${board}.tar.gz" -C "$d" .
          done
          (cd rpm-artifacts && sha256sum $(find . -maxdepth 1 -type f) | tee sha256sums.txt)

      - name: Upload artifacts (S3)
        uses: qualcomm-linux/upload-private-artifact-action@aws-v4
        id: upload_artifacts_s3
        with:
          path: rpm-artifacts
          s3_bucket: qli-prd-platform-gh-artifacts
          destination: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.BUILD_ID }}/
          fileserver_url: ${{ env.FILESERVER_URL }}

      - name: Print download URL
        id: url
        env:
          build_url: ${{ steps.upload_artifacts_s3.outputs.url }}
        run: |
          fallback='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          url="${build_url:-$fallback}"
          echo "url=${url}" >> "$GITHUB_OUTPUT"
          echo "Downloads URL: ${url}"
          echo "## Download URL" >> $GITHUB_STEP_SUMMARY
          echo "[${url}](${url})" >> $GITHUB_STEP_SUMMARY
