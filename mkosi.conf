#
# Base mkosi configuration for Qualcomm RB3 Gen2 (CentOS Stream 10, arm64).
# See mkosi.conf.d/centos.conf for distribution-specific settings.
# See mkosi.profiles/ for board/storage profiles.

[Distribution]
Distribution=centos
Architecture=arm64

[Build]
CacheDirectory=mkosi.cache
# Uncomment to use a tools container (needed if host systemd is too old)
#ToolsTree=default
Environment=SYSTEMD_REPART_OVERRIDE_FSTYPE_ROOT=ext4

[Output]
Format=disk
Output=image
SplitArtifacts=yes

[Content]
PostInstallationScripts=mkosi.postinst.d/10-dtbs.chroot
Bootable=yes
Bootloader=systemd-boot
KernelModulesInitrd=yes
KernelModulesInitrdInclude=default,ufs-qcom,phy-qcom-qmp-ufs,qcom-pcie
KernelCommandLine=clk_ignore_unused pd_ignore_unused audit=0 root=PARTLABEL=rootfs rootwait rw deferred_probe_timeout=60 console=ttyMSM0,115200 qcom_scm.download_mode=1
Hostname=centos
RootPassword=qcom
Timezone=UTC
Locale=en_US.UTF-8
PackageDirectories=mkosi.packages
